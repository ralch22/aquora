name: Deploy

# Auto-deploy the changed service(s) to Cloud Run when a PR merges to main.
# Gated by repo var DEPLOY_ENABLED=true + secrets GCP_WIF_PROVIDER / GCP_DEPLOY_SA.
# The storefront also needs secret STOREFRONT_ENV_PRODUCTION (its public NEXT_PUBLIC_* build env,
# which `next build` reads from .env.production — absent in a clean checkout).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: Service to deploy
        type: choice
        options: [both, storefront, backend]
        default: both

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      storefront: ${{ steps.decide.outputs.storefront }}
      backend: ${{ steps.decide.outputs.backend }}
      migrations: ${{ steps.decide.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        if: github.event_name == 'push'
        with:
          filters: |
            storefront:
              - 'aquora-store/apps/storefront/**'
            backend:
              - 'aquora-store/apps/backend/**'
            migrations:
              - 'aquora-store/apps/backend/src/modules/**/migrations/**'
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.service }}" in
              storefront) echo "storefront=true" >> $GITHUB_OUTPUT; echo "backend=false" >> $GITHUB_OUTPUT; echo "migrations=false" >> $GITHUB_OUTPUT ;;
              # Manual backend/both deploys re-run the migration job; it is idempotent, so a no-op when nothing is pending.
              backend)    echo "storefront=false" >> $GITHUB_OUTPUT; echo "backend=true" >> $GITHUB_OUTPUT; echo "migrations=true" >> $GITHUB_OUTPUT ;;
              *)          echo "storefront=true" >> $GITHUB_OUTPUT; echo "backend=true" >> $GITHUB_OUTPUT; echo "migrations=true" >> $GITHUB_OUTPUT ;;
            esac
          else
            echo "storefront=${{ steps.f.outputs.storefront }}" >> $GITHUB_OUTPUT
            echo "backend=${{ steps.f.outputs.backend }}" >> $GITHUB_OUTPUT
            echo "migrations=${{ steps.f.outputs.migrations }}" >> $GITHUB_OUTPUT
          fi

  deploy-storefront:
    needs: changes
    if: ${{ vars.DEPLOY_ENABLED == 'true' && needs.changes.outputs.storefront == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Write storefront build env (.env.production)
        env:
          STOREFRONT_ENV: ${{ secrets.STOREFRONT_ENV_PRODUCTION }}
        run: printf '%s' "$STOREFRONT_ENV" > aquora-store/apps/storefront/.env.production
      - name: Build & deploy storefront
        run: |
          IMG=europe-west1-docker.pkg.dev/emerge-digital-web-7034/aquora/storefront:${{ github.sha }}
          BUILD_ID=$(gcloud builds submit aquora-store/apps/storefront --tag "$IMG" \
            --machine-type=e2-highcpu-8 --timeout=1800 --async --format='value(id)')
          echo "Build $BUILD_ID submitted; polling (the deployer can't stream logs, so we poll status)..."
          while true; do
            S=$(gcloud builds describe "$BUILD_ID" --format='value(status)')
            echo "  build status: $S"
            case "$S" in
              SUCCESS) break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED) echo "Build $S — see Cloud Build console $BUILD_ID"; exit 1 ;;
            esac
            sleep 10
          done
          gcloud run deploy aquora-storefront --image "$IMG" --region europe-west1 --quiet

  deploy-backend:
    needs: changes
    if: ${{ vars.DEPLOY_ENABLED == 'true' && needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build backend image
        run: |
          IMG=europe-west1-docker.pkg.dev/emerge-digital-web-7034/aquora/backend:${{ github.sha }}
          echo "IMG=$IMG" >> "$GITHUB_ENV"
          BUILD_ID=$(gcloud builds submit aquora-store/apps/backend --tag "$IMG" \
            --machine-type=e2-highcpu-8 --timeout=1800 --async --format='value(id)')
          echo "Build $BUILD_ID submitted; polling..."
          while true; do
            S=$(gcloud builds describe "$BUILD_ID" --format='value(status)')
            echo "  build status: $S"
            case "$S" in
              SUCCESS) break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED) echo "Build $S — see Cloud Build console $BUILD_ID"; exit 1 ;;
            esac
            sleep 10
          done
      # Out-of-band module migrations (WS0-PR5). Boot-time `medusa db:migrate` is unreliable here
      # (240s startup probe + single-CPU starvation + CLI hangs — see the backend Dockerfile), so we
      # apply pending migrations from a short-lived Cloud Run Job built from the SAME image, with the
      # aquora-db Cloud SQL socket attached and DATABASE_URL pulled from Secret Manager (WS0-PR6).
      # The runner (src/scripts/run-migrations.js) is a tiny idempotent `pg` script. This runs BEFORE
      # the serving deploy so the new tables exist before the new revision takes traffic. Gated on
      # migration files actually changing in the merged push.
      - name: Apply backend migrations (out-of-band Cloud Run Job)
        if: ${{ needs.changes.outputs.migrations == 'true' }}
        run: |
          gcloud run jobs deploy aquora-migrate \
            --image "$IMG" \
            --region europe-west1 \
            --set-cloudsql-instances=emerge-digital-web-7034:europe-west1:aquora-db \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest \
            --command=node \
            --args=/app/src/scripts/run-migrations.js \
            --max-retries=0 \
            --task-timeout=600 \
            --quiet
          # --wait blocks until the task finishes; a non-zero exit from the runner fails this step.
          gcloud run jobs execute aquora-migrate --region europe-west1 --wait
      - name: Deploy backend (serving revision)
        run: |
          gcloud run deploy aquora-backend --image "$IMG" --region europe-west1 --quiet
