name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  storefront:
    name: storefront
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aquora-store/apps/storefront
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: Build
        env:
          # Placeholders — these are inlined at build time; the client reads real values at runtime.
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api.aquora.ae
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_ci_placeholder
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aquora-store/apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install --legacy-peer-deps --no-audit --no-fund
      # Medusa builds with its own tsconfig; a raw root tsc over admin TSX is noise (see AGENTS.md).
      - name: Build
        run: npm run build
