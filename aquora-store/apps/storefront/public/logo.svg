<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" role="img" aria-label="Aquora">
  <title>Aquora</title>
  <!-- Standalone "O" ring mark: a precise ring whose lower arc thickens into a water meniscus. -->
  <g fill="none" stroke="#0E6E73" stroke-linecap="round">
    <circle cx="70" cy="70" r="40" stroke-width="12"/>
    <path d="M37 93 A40 40 0 0 0 103 93" stroke-width="18"/>
  </g>
  <!-- Wordmark -->
  <text x="132" y="95" font-family="Sora, 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-size="66" font-weight="800" letter-spacing="4" fill="#0E6E73">AQUORA</text>
</svg>
